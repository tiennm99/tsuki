languageCode: vi
defaultContentLanguage: vi

pagination:
  pagerSize: 10
  path: page

taxonomies:
  category: categories
  tag: tags

permalinks:
  post: /:year/:month/:day/:contentbasename/

markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      autoHeadingIDType: github-ascii
  highlight:
    noClasses: false
    lineNos: false
  tableOfContents:
    startLevel: 2
    endLevel: 4

params:
  search:
    enable: true
  comments:
    giscus:
      enable: false
  toc:
    enable: true
    minWordCount: 400
