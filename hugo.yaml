languageCode: vi
defaultContentLanguage: vi

module:
  mounts:
    - source: archetypes
      target: archetypes
    - source: assets
      target: assets
    - source: data
      target: data
    - source: i18n
      target: i18n
    - source: layouts
      target: layouts
    - source: static
      target: static

pagination:
  pagerSize: 10
  path: page

taxonomies:
  category: categories
  tag: tags

permalinks:
  post: /:year/:month/:day/:contentbasename/

markup:
  goldmark:
    renderer:
      unsafe: true
    parser:
      autoHeadingIDType: github-ascii
  highlight:
    noClasses: false
    lineNos: false
  tableOfContents:
    startLevel: 2
    endLevel: 4

related:
  threshold: 80
  includeNewer: true
  toLower: true
  indices:
    - name: tags
      weight: 100
    - name: categories
      weight: 60
    - name: date
      weight: 10

params:
  search:
    enable: true
  comments:
    giscus:
      enable: false
  toc:
    enable: true
    minWordCount: 400
  relatedPostsCount: 3
