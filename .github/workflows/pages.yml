name: Build and deploy exampleSite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.154.0
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        working-directory: exampleSite
        run: hugo --gc --minify --baseURL "https://tiennm99.github.io/tsuki/"

      - name: Build Pagefind index
        run: |
          if find exampleSite/public -name "*.html" -type f | head -1 | grep -q .; then
            npx pagefind --site exampleSite/public
          else
            echo "No HTML files found yet (layouts not implemented). Skipping Pagefind."
          fi

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: exampleSite/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
