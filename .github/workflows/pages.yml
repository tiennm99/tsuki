name: Build and deploy exampleSite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      HUGO_VERSION: 0.154.0
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ env.HUGO_VERSION }}
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        working-directory: exampleSite
        run: hugo --gc --minify --baseURL "https://tiennm99.github.io/tsuki/"

      - name: Build Pagefind index
        run: npx pagefind --site exampleSite/public

      - name: Assert CSS bundle budget (≤ 4200 B gz)
        run: |
          css=$(find exampleSite/public -name 'tsuki.bundle.*.css' -print -quit)
          if [ -z "$css" ]; then
            echo "::error::Could not locate tsuki.bundle.*.css under exampleSite/public"
            exit 1
          fi
          sz=$(gzip -9 -c "$css" | wc -c)
          echo "tsuki bundle gz: ${sz} B (limit 4200)"
          if [ "$sz" -gt 4200 ]; then
            echo "::error::CSS bundle exceeds 4200 B gz budget (was ${sz} B)"
            exit 1
          fi

      - name: Smoke tests (SEO + a11y + features regression guard)
        run: ./scripts/smoke-tests.sh exampleSite/public

      - name: htmltest (broken internal links + HTML5 validation)
        # Pinned to master SHA (2026-05-10) for supply-chain hygiene. Refresh periodically.
        uses: wjdp/htmltest-action@31be84a95c860a331e0cf9a99f71e3eb39d2f86b
        with:
          config: .htmltest.yml

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v5
        with:
          path: exampleSite/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
