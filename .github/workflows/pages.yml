name: Build and deploy exampleSite

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        # Floor (theme.toml min_version) + current pinned. Deploy artifact is uploaded only from the current version.
        hugo: ["0.146.0", "0.154.0"]
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Setup Hugo (extended)
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: ${{ matrix.hugo }}
          extended: true

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build site
        working-directory: exampleSite
        run: hugo --gc --minify --baseURL "https://tiennm99.github.io/tsuki/"

      - name: Build Pagefind index
        run: npx pagefind --site exampleSite/public

      - name: Smoke tests (SEO + a11y + per-kind CSS budget + features regression guard)
        run: ./scripts/smoke-tests.sh exampleSite/public

      - name: htmltest (broken internal links + HTML5 validation)
        # Pinned to master SHA (2026-05-10) for supply-chain hygiene. Refresh periodically.
        uses: wjdp/htmltest-action@31be84a95c860a331e0cf9a99f71e3eb39d2f86b
        with:
          config: .htmltest.yml

      - name: Upload artifact
        # Only upload from the current Hugo version; the floor-version run is for compatibility check.
        if: matrix.hugo == '0.154.0'
        uses: actions/upload-pages-artifact@v5
        with:
          path: exampleSite/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
