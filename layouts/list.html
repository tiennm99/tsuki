{{ define "body_class" }}list{{ end }}

{{ define "main" }}
<header class="list-header">
  <h1 class="list-title">{{ .Title }}</h1>
  {{- with .Description }}<p class="list-description">{{ . }}</p>{{ end }}
</header>

<div class="post-list">
  {{- range .Pages }}
    {{ partial "post-card.html" . }}
  {{- end }}
</div>
{{ end }}
