<nav class="site-nav" aria-label="Main">
  <ul>
  {{- range site.Menus.main }}
    {{- $current := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
    <li>
      <a href="{{ .URL | relURL }}"{{ if $current }} aria-current="page"{{ end }}>{{ .Name }}</a>
    </li>
  {{- end }}
  </ul>
</nav>
