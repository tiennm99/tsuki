<!DOCTYPE html>
<html lang="{{ site.Language.LanguageCode | default site.Language.Lang | default "en" }}"
  data-copy-code="{{ i18n "copyCode" | default "Copy" }}"
  data-copied-code="{{ i18n "copiedCode" | default "Copied" }}">
<head>
  {{ partial "head.html" . }}
  {{ block "head_extra" . }}{{ end }}
</head>
<body class="{{ block "body_class" . }}{{ end }}">
  <a class="skip-link" href="#main">{{ i18n "skipToContent" | default "Đến nội dung chính" }}</a>
  {{ partial "header.html" . }}
  <main id="main">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ block "scripts" . }}{{ end }}
</body>
</html>
