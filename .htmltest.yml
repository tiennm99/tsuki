DirectoryPath: exampleSite/public
CheckExternal: false
IgnoreDirectoryMissingTrailingSlash: true
IgnoreInternalEmptyHash: true
IgnoreEmptyHref: false
EnforceHTML5: true
# Strip the /tsuki/ baseURL prefix so links resolve against exampleSite/public/.
URLSwap:
  ^/tsuki/: /
IgnoreURLs:
  - "^https://giscus.app"
  - "^https://github.com/"
  - "^https://gohugo.io"
